<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Multiple Hunt</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div id="app">
      <button id="lang-toggle" class="lang-btn">العربية</button>
      <img src="logo/sbs_ic (1).png" class="app-logo" alt="Logo" referrerPolicy="no-referrer" />
      
      <main class="home-container" id="home-screen">
        <h1 id="game-title">
          <span class="title-part-1">MULTIPLE</span>
          <span class="title-part-2">HUNT</span>
        </h1>
        
        <div class="card" id="home-card">
          <h2 id="how-to-play-title">HOW TO PLAY</h2>
          <ul class="rules-list">
            <li id="rule-1">Click or tap the numbers that satisfies the condition</li>
            <li id="rule-2">Score before time runs out!</li>
          </ul>
        </div>
        
        <div class="home-actions">
          <button id="play-btn" class="primary-btn">PLAY NOW</button>
          <button id="levels-btn-home" class="secondary-btn-home">LEVELS</button>
        </div>
      </main>

      <main class="game-container hidden" id="game-screen">
        <div class="game-card">
          <div class="game-header">
            <div class="stats">
              <div id="level-display">Level: 1</div>
              <div id="score-display">Score: 0</div>
            </div>
            <div class="timer" id="timer-display">00:20</div>
            <button id="levels-btn-game" class="icon-btn">
              <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="7" height="7" x="3" y="3" rx="1"/><rect width="7" height="7" x="14" y="3" rx="1"/><rect width="7" height="7" x="14" y="14" rx="1"/><rect width="7" height="7" x="3" y="14" rx="1"/></svg>
            </button>
          </div>
          
          <div class="condition-box">
            <h2 id="condition-text">Pick the Greatest multiple of 5</h2>
          </div>
          
          <div class="numbers-grid" id="numbers-grid">
            <!-- 6 number cards will be generated here -->
          </div>
        </div>
      </main>

      <div class="modal-overlay hidden" id="modal-overlay">
        <div class="modal" id="game-modal">
          <h2 id="modal-title">You won</h2>
          <div id="modal-body">
            <p id="final-score-text" class="hidden">Final Score: 0</p>
            <p id="correct-answer-text" class="hidden">Correct answer was: 25</p>
          </div>
          <div class="modal-actions">
            <button id="next-level-btn" class="modal-btn primary-btn hidden">Next Level</button>
            <button id="try-again-btn" class="modal-btn primary-btn hidden">Try Again</button>
            <button id="return-home-btn" class="modal-btn secondary-btn hidden">Return Home</button>
          </div>
        </div>
      </div>

      <div class="modal-overlay hidden" id="levels-modal-overlay">
        <div class="modal" id="levels-modal">
          <h2 id="levels-modal-title">Levels</h2>
          <div class="levels-grid" id="levels-grid">
            <!-- Levels will be generated here -->
          </div>
          <div class="modal-actions">
            <button id="close-levels-btn" class="modal-btn secondary-btn">Close</button>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="js/script.js"></script>
  </body>
</html>
